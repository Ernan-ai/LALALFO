name: lalafo_clone
description: A Lalafo.kg marketplace clone built with Flutter + MVVM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_animate: ^4.5.2
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  google_generative_ai: ^0.4.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/faces/
